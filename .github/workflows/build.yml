name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi python3

      - name: Fetch Pico SDK 2.1.1
        run: |
          git clone --depth 1 --branch 2.1.1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          git -C "$HOME/pico-sdk" submodule update --init --depth 1 lib/tinyusb

      - name: Verify generated sprites are in sync
        run: |
          python3 tools/gen_sprites.py
          git diff --exit-code src/gfx/sprites.h src/gfx/sprites.c

      - name: Build firmware
        run: |
          export PICO_SDK_PATH="$HOME/pico-sdk"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja -C build
          arm-none-eabi-size build/nova_raid.elf

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova_raid-uf2
          path: build/nova_raid.uf2

      - name: Attach UF2 to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" build/nova_raid.uf2 --clobber

  host-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run full-state-machine capture
        run: |
          make -C tools/host
          mkdir -p /tmp/frames
          ./tools/host/capture /tmp/frames
          ls -la /tmp/frames

      - name: Upload captured frames
        uses: actions/upload-artifact@v4
        with:
          name: game-frames
          path: /tmp/frames/*.ppm
