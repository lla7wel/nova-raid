<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640" font-family="Menlo, Consolas, monospace">
  <style>
    .comp { fill:none; stroke:#e8e8f0; stroke-width:1.5; }
    .wire { stroke:#50dcff; stroke-width:1.3; fill:none; }
    .pwr  { stroke:#ff9628; stroke-width:1.3; fill:none; }
    .gndw { stroke:#8a8aa0; stroke-width:1.3; fill:none; }
    .t  { fill:#e8e8f0; font-size:12px; }
    .s  { fill:#9a9ab0; font-size:10px; }
    .p  { fill:#50dcff; font-size:11px; }
    .o  { fill:#ff9628; font-size:11px; }
    .inf { fill:#eb50ff; font-size:10px; }
  </style>
  <rect width="920" height="640" fill="#0a0c16"/>
  <text x="460" y="28" text-anchor="middle" fill="#ffffff" font-size="17">NOVA RAID - Logical Schematic</text>
  <text x="460" y="46" text-anchor="middle" class="s">On-board interconnect of the EP-0172 kit as used by the firmware. No user wiring is required.</text>

  <!-- Pico body -->
  <rect x="360" y="90" width="200" height="380" class="comp"/>
  <text x="460" y="112" text-anchor="middle" class="t">RASPBERRY PI PICO W</text>
  <text x="460" y="127" text-anchor="middle" class="s">(RP2040)</text>

  <!-- left pins -->
  <g>
    <line x1="330" y1="150" x2="360" y2="150" class="wire"/><text x="365" y="154" class="p">GP2  SPI0 SCK</text>
    <line x1="330" y1="175" x2="360" y2="175" class="wire"/><text x="365" y="179" class="p">GP3  SPI0 MOSI</text>
    <line x1="330" y1="200" x2="360" y2="200" class="wire"/><text x="365" y="204" class="p">GP4  SPI0 MISO</text>
    <line x1="330" y1="225" x2="360" y2="225" class="wire"/><text x="365" y="229" class="p">GP5  LCD CS</text>
    <line x1="330" y1="250" x2="360" y2="250" class="wire"/><text x="365" y="254" class="p">GP6  LCD DC</text>
    <line x1="330" y1="275" x2="360" y2="275" class="wire"/><text x="365" y="279" class="p">GP7  LCD RST</text>
    <line x1="330" y1="310" x2="360" y2="310" class="wire" stroke-dasharray="4 3"/><text x="365" y="314" class="p">GP8  I2C0 SDA</text>
    <line x1="330" y1="330" x2="360" y2="330" class="wire" stroke-dasharray="4 3"/><text x="365" y="334" class="p">GP9  I2C0 SCL</text>
    <line x1="330" y1="370" x2="360" y2="370" class="wire"/><text x="365" y="374" class="p">GP26 ADC0 (X)</text>
    <line x1="330" y1="395" x2="360" y2="395" class="wire"/><text x="365" y="399" class="p">GP27 ADC1 (Y)</text>
    <line x1="330" y1="435" x2="360" y2="435" class="pwr"/><text x="365" y="439" class="o">3V3 OUT</text>
  </g>
  <!-- right pins -->
  <g>
    <line x1="560" y1="150" x2="590" y2="150" class="wire"/><text x="555" y="154" text-anchor="end" class="p">GP12 WS2812</text>
    <line x1="560" y1="200" x2="590" y2="200" class="wire"/><text x="555" y="204" text-anchor="end" class="p">GP13 BUZZER</text>
    <line x1="560" y1="250" x2="590" y2="250" class="wire"/><text x="555" y="254" text-anchor="end" class="p">GP14 BTN2</text>
    <line x1="560" y1="300" x2="590" y2="300" class="wire"/><text x="555" y="304" text-anchor="end" class="p">GP15 BTN1</text>
    <line x1="560" y1="350" x2="590" y2="350" class="wire"/><text x="555" y="354" text-anchor="end" class="p">GP16 LED D1</text>
    <line x1="560" y1="390" x2="590" y2="390" class="wire"/><text x="555" y="394" text-anchor="end" class="p">GP17 LED D2</text>
    <line x1="560" y1="435" x2="590" y2="435" class="pwr"/><text x="555" y="439" text-anchor="end" class="o">VSYS (USB 5V)</text>
  </g>

  <!-- LCD module -->
  <rect x="120" y="130" width="180" height="170" class="comp"/>
  <text x="210" y="152" text-anchor="middle" class="t">3.5" TFT MODULE</text>
  <text x="210" y="167" text-anchor="middle" class="s">ST7796S + FT6236</text>
  <line x1="300" y1="190" x2="330" y2="150" class="wire"/><text x="240" y="192" class="s">SCK</text>
  <line x1="300" y1="210" x2="330" y2="175" class="wire"/><text x="240" y="212" class="s">SDI</text>
  <line x1="300" y1="230" x2="330" y2="200" class="wire"/><text x="240" y="232" class="s">SDO</text>
  <line x1="300" y1="250" x2="330" y2="225" class="wire"/><text x="240" y="252" class="s">CS</text>
  <line x1="300" y1="268" x2="330" y2="250" class="wire"/><text x="240" y="270" class="s">DC</text>
  <line x1="300" y1="285" x2="330" y2="275" class="wire"/><text x="240" y="287" class="s">RST</text>
  <text x="210" y="290" text-anchor="middle" class="s"></text>
  <line x1="230" y1="300" x2="230" y2="320" class="wire" stroke-dasharray="4 3"/>
  <line x1="230" y1="320" x2="330" y2="320" class="wire" stroke-dasharray="4 3"/>
  <text x="236" y="332" class="s">touch (unused)</text>

  <!-- Joystick -->
  <rect x="120" y="350" width="180" height="90" class="comp"/>
  <text x="210" y="370" text-anchor="middle" class="t">JOYSTICK</text>
  <text x="210" y="384" text-anchor="middle" class="s">2x 10k pot, 3V3 supply</text>
  <line x1="300" y1="400" x2="330" y2="370" class="wire"/><text x="248" y="400" class="s">X wiper</text>
  <line x1="300" y1="420" x2="330" y2="395" class="wire"/><text x="248" y="420" class="s">Y wiper</text>
  <line x1="210" y1="440" x2="210" y2="470" class="pwr"/>
  <line x1="210" y1="470" x2="330" y2="470" class="pwr"/>
  <line x1="330" y1="470" x2="330" y2="435" class="pwr"/>

  <!-- WS2812 -->
  <rect x="660" y="120" width="180" height="70" class="comp"/>
  <text x="750" y="142" text-anchor="middle" class="t">WS2812 RGB LED</text>
  <text x="750" y="157" text-anchor="middle" class="s">DIN &#8592; GP12, 5V/GND rail</text>
  <line x1="590" y1="150" x2="660" y2="150" class="wire"/>
  <text x="620" y="144" class="s">DIN</text>

  <!-- Buzzer -->
  <rect x="660" y="210" width="180" height="80" class="comp"/>
  <text x="750" y="232" text-anchor="middle" class="t">PIEZO BUZZER</text>
  <text x="750" y="247" text-anchor="middle" class="s">passive, PWM driven</text>
  <text x="750" y="262" text-anchor="middle" class="inf">on-board driver stage inferred</text>
  <line x1="590" y1="200" x2="625" y2="200" class="wire"/>
  <line x1="625" y1="200" x2="625" y2="240" class="wire"/>
  <line x1="625" y1="240" x2="660" y2="240" class="wire"/>

  <!-- Buttons -->
  <g>
    <rect x="660" y="310" width="180" height="100" class="comp"/>
    <text x="750" y="330" text-anchor="middle" class="t">BTN1 / BTN2</text>
    <text x="750" y="345" text-anchor="middle" class="s">momentary, close to GND</text>
    <text x="750" y="360" text-anchor="middle" class="s">firmware enables pull-ups</text>
    <text x="750" y="375" text-anchor="middle" class="s">logic: pressed = LOW</text>
    <line x1="590" y1="250" x2="628" y2="250" class="wire"/>
    <line x1="628" y1="250" x2="628" y2="340" class="wire"/>
    <line x1="628" y1="340" x2="660" y2="340" class="wire"/>
    <line x1="590" y1="300" x2="614" y2="300" class="wire"/>
    <line x1="614" y1="300" x2="614" y2="380" class="wire"/>
    <line x1="614" y1="380" x2="660" y2="380" class="wire"/>
    <line x1="750" y1="410" x2="750" y2="430" class="gndw"/>
    <line x1="735" y1="430" x2="765" y2="430" class="gndw"/>
    <line x1="741" y1="435" x2="759" y2="435" class="gndw"/>
    <line x1="746" y1="440" x2="754" y2="440" class="gndw"/>
  </g>

  <!-- LEDs -->
  <g>
    <rect x="660" y="460" width="180" height="90" class="comp"/>
    <text x="750" y="480" text-anchor="middle" class="t">LED D1 / LED D2</text>
    <text x="750" y="495" text-anchor="middle" class="s">series resistor to GND</text>
    <text x="750" y="510" text-anchor="middle" class="s">D1 &#8592; GP16   D2 &#8592; GP17</text>
    <text x="750" y="530" text-anchor="middle" class="s">(D3/D4 hard-wired to 3V3/5V)</text>
    <line x1="590" y1="350" x2="612" y2="350" class="wire"/>
    <line x1="612" y1="350" x2="612" y2="490" class="wire"/>
    <line x1="612" y1="490" x2="660" y2="490" class="wire"/>
    <line x1="590" y1="390" x2="600" y2="390" class="wire"/>
    <line x1="600" y1="390" x2="600" y2="510" class="wire"/>
    <line x1="600" y1="510" x2="660" y2="510" class="wire"/>
  </g>

  <!-- Legend -->
  <rect x="120" y="500" width="420" height="110" class="comp" stroke="#8a8aa0"/>
  <text x="135" y="522" class="t">LEGEND</text>
  <line x1="135" y1="540" x2="175" y2="540" class="wire"/><text x="185" y="544" class="s">signal (solid: used by firmware)</text>
  <line x1="135" y1="560" x2="175" y2="560" class="wire" stroke-dasharray="4 3"/><text x="185" y="564" class="s">present on kit, unused by the game</text>
  <line x1="135" y1="580" x2="175" y2="580" class="pwr"/><text x="185" y="584" class="s">power rail</text>
  <text x="135" y="602" class="inf">magenta note = inferred from vendor docs, not physically traced</text>
</svg>
